name: Deploy Frontend to Pages

on:
  push:
    branches: ["main"] # Change this if you used the orphan branch! (e.g., 'et-concierge-submission')
    paths:
      - "frontend/**" # Optimization: Only triggers if you actually change frontend code

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    # THIS IS THE MAGIC: Forces all run commands to execute inside the frontend folder
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: "./frontend/package-lock.json" # Tells cache where to look

      - name: Install dependencies
        run: npm ci # Will run inside ./frontend

      - name: Build
        run: npm run build # Will run inside ./frontend

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./frontend/dist" # Points explicitly to the nested build output

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
